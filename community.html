            <ul class="nav-links">

            <button class="nav-mobile-btn" id="mobile-nav-btn"><i class="fas fa-bars"></i></button>

            <p>Poser vos questions, partagez vos créations, et aidez les autres développeurs.</p>

            <div class="filter-bar" style="justify-content: space-between;">

                    <i class="fas fa-search search-icon"></i>
                    <input type="text" placeholder="Rechercher dans les posts..." id="post-search">
                </div>
                <button class="btn btn-primary" onclick="openModal('create-post-modal')">
                    <i class="fas fa-plus"></i> Nouveau post
                </button>
            </div>

            <!-- Tabs de catégorie -->
            <div class="community-tabs">
                <button class="community-tab active" data-category="all">
                    <i class="fas fa-globe"></i> Tous
